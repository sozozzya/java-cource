# JDBC
jdbc.url=${JDBC_URL:jdbc:postgresql://localhost:5432/hotel_db}
jdbc.user=${JDBC_USER:postgres}
jdbc.password=${JDBC_PASSWORD:postgres}
jdbc.driver=${JDBC_DRIVER:org.postgresql.Driver}

# Allow changing room maintenance status
room.status.change.enabled=true

# Number of stay records kept per room
room.history.size=3