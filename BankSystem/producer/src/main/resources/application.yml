spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/bank
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka-1:9092,kafka-2:9092,kafka-3:9092

logging:
  level:
    root: INFO